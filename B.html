<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آخر مستخدم</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    flex-direction:column;
}

.box{
    background:#222;
    padding:30px;
    border-radius:12px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:green;
    color:white;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="box" id="user">
    <h1>في انتظار البيانات...</h1>
</div>

<!-- 🔓 زر تفعيل الصوت -->
<button onclick="enableAudio()">تفعيل الصوت</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, limit, onSnapshot }
from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCgOTHb4d-M1AsMEcGKm6iVFXHdss3W37c",
  authDomain: "makeri-12fa6.firebaseapp.com",
  projectId: "makeri-12fa6",
  storageBucket: "makeri-12fa6.firebasestorage.app",
  messagingSenderId: "14239732723",
  appId: "1:14239732723:web:8c1a8f5d7b4fe2c1d7f886"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let lastUserId = null;
let audioEnabled = false;

// 🔓 تفعيل الصوت
window.enableAudio = function(){
    audioEnabled = true;
    alert("تم تفعيل الصوت 🔊");
}

// 🔊 نطق الاسم
function speak(text){

    if(!audioEnabled) return; // 🚫 يمنع الصوت إذا لم يتم التفعيل

    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "ar-SA";
    msg.rate = 1;
    msg.pitch = 1;

    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

const q = query(
    collection(db,"users"),
    orderBy("createdAt","desc"),
    limit(1)
);

onSnapshot(q, (snapshot)=>{

    snapshot.forEach(doc=>{
        const u = doc.data();

        document.getElementById("user").innerHTML = `
            <h1>${u.nom} ${u.prenom}</h1>
            <p>رقم المكتب: ${u.bureau}</p>
        `;

        if(lastUserId !== null && lastUserId !== doc.id){
            speak(`${u.nom} ${u.prenom}`);
        }

        lastUserId = doc.id;
    });

});

</script>

</body>
</html>
