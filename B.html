<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appel</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    color:#00ff99;
    font-family:Arial;
    flex-direction:column;
    text-align:center;
}

.box{
    background:#111;
    padding:40px;
    border:2px solid #00ff99;
    border-radius:15px;
    min-width:300px;
    box-shadow:0 0 20px #00ff99;
}

h1{font-size:60px;margin:0;}
p{font-size:25px;}

button{
    margin-top:20px;
    padding:10px 20px;
    background:#00ff99;
    border:none;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="box" id="user">
    <h1>---</h1>
    <p>En attente...</p>
</div>

<button onclick="enableVoice()">Activer الصوت</button>

<!-- 🔊 الأصوات -->
<audio id="soundA" src="download.mp3"></audio>
<audio id="soundB" src="B.mp3"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, limit, onSnapshot }
from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCgOTHb4d-M1AsMEcGKm6iVFXHdss3W37c",
  authDomain: "makeri-12fa6.firebaseapp.com",
  projectId: "makeri-12fa6",
  storageBucket: "makeri-12fa6.firebasestorage.app",
  messagingSenderId: "14239732723",
  appId: "1:14239732723:web:8c1a8f5d7b4fe2c1d7f886"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let lastUserId = null;
let voiceEnabled = false;

window.enableVoice = function(){
    voiceEnabled = true;
    alert("Audio activé 🔊");
}

// 🔊 الكلام الفرنسي
function speak(text){

    const soundA = document.getElementById("soundA");
    const soundB = document.getElementById("soundB");

    // 🚫 إذا الصوت غير مفعل
    if(!voiceEnabled) return;

    // 🔊 تشغيل A.mp3
    soundA.currentTime = 0;
    soundA.play().catch(()=>{});

    soundA.onended = function(){

        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = "fr-FR";
        msg.rate = 1;

        // 🔊 بعد الكلام تشغيل B.mp3
        msg.onend = function(){
            soundB.currentTime = 0;
            soundB.play().catch(()=>{});
        };

        speechSynthesis.cancel();
        speechSynthesis.speak(msg);
    };
}

const q = query(
    collection(db,"users"),
    orderBy("createdAt","desc"),
    limit(1)
);

onSnapshot(q, (snapshot)=>{

    snapshot.forEach(doc=>{
        const u = doc.data();

        document.getElementById("user").innerHTML = `
            <h1>${u.nom} ${u.prenom}</h1>
            <p>Bureau: ${u.bureau}</p>
        `;

        if(lastUserId !== null && lastUserId !== doc.id && voiceEnabled){

            const message =
                `${u.nom} ${u.prenom}, viens au bureau numéro ${u.bureau}`;

            speak(message);
        }

        lastUserId = doc.id;
    });

});

</script>

</body>
</html>
