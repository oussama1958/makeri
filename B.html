<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dernier utilisateur</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    flex-direction:column;
}

.box{
    background:#222;
    padding:25px;
    border-radius:12px;
    min-width:250px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:green;
    color:white;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="box" id="user">
    <h1>En attente des données...</h1>
</div>

<button onclick="enableVoice()">Activer الصوت 🔊</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, limit, onSnapshot }
from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCgOTHb4d-M1AsMEcGKm6iVFXHdss3W37c",
  authDomain: "makeri-12fa6.firebaseapp.com",
  projectId: "makeri-12fa6",
  storageBucket: "makeri-12fa6.firebasestorage.app",
  messagingSenderId: "14239732723",
  appId: "1:14239732723:web:8c1a8f5d7b4fe2c1d7f886"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let lastUserId = null;
let voiceEnabled = false;

window.enableVoice = function(){
    voiceEnabled = true;
    alert("Audio activé 🔊");
}

// 🔊 صوت فرنسي
function speak(text){
    if(!voiceEnabled) return;

    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "fr-FR";
    msg.rate = 1;

    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

const q = query(
    collection(db,"users"),
    orderBy("createdAt","desc"),
    limit(1)
);

onSnapshot(q, (snapshot)=>{

    snapshot.forEach(doc=>{
        const u = doc.data();

        document.getElementById("user").innerHTML = `
            <h1>${u.nom} ${u.prenom}</h1>
            <p>Bureau: ${u.bureau}</p>
        `;

        if(lastUserId !== null && lastUserId !== doc.id && voiceEnabled){

            const message =
                `${u.nom} ${u.prenom}, viens au bureau numéro ${u.bureau}`;

            speak(message);
        }

        lastUserId = doc.id;
    });

});

</script>

</body>
</html>
